front:
  text: 太古集卷之一
  hash: sha256:1e7c4d90a56e400e24ee7ea88af18027282330c93b8bef1a4b9405bebea4f220
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0063_HFL_001-001a, image: hfl/0798/0798-144.png}
body:
  text: 廣寧子郝大通撰周易參同契簡要釋義並序教者道之所以生也道本無名彊名曰道教本無形假言顯教教之精粹備包有無故以無言之存乎道體以有言之存乎器用體之以為無用之以為利若曰有形生於無形則乾坤安從而生用教化於無知則真知安從而出若夫太極肇分三才定位布五行於玄極列八卦於空廓發揮七政躔次紀綱垂萬象於上方育羣靈於下土是故聖人仰觀俯察裁成輔相信四時而生萬物通變化而行鬼神通精無門藏神無穴寂然不動感而遂通至於修真達道之士用之德化十方慧超三界升沉而龍吟虎嘯消息而蛇隱龜藏一往一來神號而鬼哭一伸一屈物我以俱忘當是時電激而八表騰輝雷震而三山動色鶴飛鳳舞鹿返羊回冲氣盈盈瑞雲密密萬神羅列羣魔遁形玄珠迸落於靈臺芝草齊生於紫府覺花才放法海淵深直入玄都永超陸地所謂毛吞大海芥納須彌木馬嘶嗚石人唱和此皆開悟後覺不得已而為言是道也用之以順兩儀序而百物和行之以逆六位傾而五行亂非夫至極玄妙其孰能與於此乎於是略叙玄文删為節要云耳時大定十八年歲次戊戌孟夏十有九日序易之道以乾為門以坤為户以北辰為樞機以日月為運化以四時為職宰以五行為變通以虛靜為體以應動為用以剛柔為基以清淨為正以雲雨為利以萬象為法以品類為一以吉凶為常以生死為元以有無為教故知教之與化必在乎人體之善用必在乎心變而又通必在乎神以一神總無量之神以一法包無邊之法以一心統無數之心自古及今綿綿若存是謂周易參同契簡要釋之義也天體道廣清虛廣遠純陽不雜乾用德普運行不息應化無窮善始嘉通會合群靈通理物性羲和貞固協和濟利堅固貞正大妙至哉法此行道隨時變通玄元聖祖規矩後人光澤天下資乎萬物衆象之宜資取乾用統御雲雨雲氣流行雨澤施布總及萬靈無有壅蔽克明初末克明萬物終始之道始則潜伏終則飛躍可潜則潜可飛則飛是明達乎始終之道時乘六户陽有六則陰有六則健用隨時始終如一若不以時而用者應潜則飛應飛則潜應生而殺應殺而生六位不以時乘而反害矣伏虎飛龍陰伏陽飛陽生陰殺式宙控宇升降不怠運轉無窮變力化功應用之道革故從新為之以漸謂之變一有一無忽然而改謂之化言乾之為道使物漸變者使物卒化者莫非資始生養萬物總統隱顯之功性端命輔乾之為用見乎變化變化之功使物各正性命性者天生之質若剛柔遲速之别命者人所禀受若貴賤壽夭之屬故知無形生於有形有形之所纍也惟天道有形能健而不為所纍者蓋謂乘變化而御大器靜專動直不失大和乾之為體靜住之時則專一不轉移也其運動之時正直不傾邪也不失大利豈非正性命之情者邪乾能正定物之性命物之性命各有情也所禀生者謂之性隨時念慮謂之情故以真言之存乎其性以邪言之存乎其情情去性存命自歸而輔之保合太和乾之為用純陽剛暴若無和順則物不得利又失其正若能保安合會太和之道乃能永固使物各正性命而久長也利貞乃甫貞固幹用利益於物剛專柔直內則存乎剛健專一不移轉也外則用乎柔弱正直不傾邪也匠衆規矩君子所以能行此道匠成萬物教化無窮者也君子自彊運用不休終而復始彊而又壯君子之道備矣君者主也子者愛也主臨上位愛人濟物學道之者通乾用而行大利晝夜不息無有虧退君子之人自彊勉力不有止息惟施於衆教令可取此明君子之人體道用事內剛外順靜專動直若雲行雨施四時以序萬物以生一切群品無不周普地體道大沈實純厚無所不載坤用德隆柔和厚載包容衆垢以順羣生通理物情猶乾之德其德隆大長益羣品長養利益羣靈品類始生萬有各得通暢事備曲通順時待物屈己伸人攸攸君子柔順幹正嘉美之功雌極化雄不為事始待唱乃和謙尊卑光己若進人必人進己先雌而化雄也西南不利陰柔不立物有所害東北立功志意和同性行柔弱臨事决斷不有私曲正此義也乘此達彼得正順志利保守常黃委宗風惟政是從隨時渝變資生萬有妙用宏闊無所疏遠承順天聰行不違禮柔順不邪厚能載物至順包承不亂羣也至理無窮居中得正任其自然含弘光熾和光同衆俯仰不獨品類熙沖和氣沖滿物得生存言善則遷道歸群品始終不懈君子之正實相非相依尊履正行命有功返視內觀相實非有非相之實實非相故真空不空不居任不造為空真不存不空之真真不空故全其衆妙質素不奢修仁守正器與玄同清淨精潔固志在一恢弘博施中正不偏安乎得失變通隨時成其道果太古集卷之一
