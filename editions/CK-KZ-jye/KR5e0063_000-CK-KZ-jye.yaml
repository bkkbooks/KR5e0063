body:
  text: 余少時在燕趙間聞太古眞人之名然未嘗瞻拜履錫聆謦欬之音頗爲慊恨每一思咏風烈如想蓬萊瀛洲方丈中人也今適得親見眞人法嗣普照大師范君君爲人聰明照了八窗玲瓏其在東平之正一也道俗瞻依風聲千里雲集檀施興建道場廣殿齋厨賓寮廩舍纔四三年已不啻數十百楹矣一日過璧曰圓曦所以區區成此功德者亡他政欲推廣先師道範俾行爾其先師太古眞人舊有崑崙文集當時刊行者蔑裂訛漏極多圓曦以謂宗風準的道學淵源在則人亡則書蓋不可須臾離也雖甓甃浮圖增九級之高曾未若心印書傳無片言之誤衆人徒見圓曦營建葺累之勤孰知於崑崙文集補綴闕遺改正差繆亦頗有一日之勞焉書已補完子盍爲之序引璧曰少時傾嚮眞人風烈以不及瞻拜履錫爲恨今得附名於文集間蓋甚幸也然嚮所得皆傳聞語大師實爲法嗣親炙日久知眞人之詳莫如大師請追述眞人道德風烈之一二以實叙引以信後人大師因手錄行實見示其錄如左師俗姓郝世居甯海爲州人之首戸昆季皆從儒學兄諱俊彦舉進士第官至朝列大夫昌邑縣令師獨幼年穎異識度夷曠悠然有出塵之姿祖師重陽眞人大定丁亥自秦適齊抵甯海一見師卽以神仙許之後於崑崙山對衆傳衣師自傳衣之後亦不以得道自居蓋自韜晦往往乞食於眞定邢洺間過趙州南石橋之下因持不語跌坐留六年寒暑風雨不易其處童子來劇者見其土木形骸至以瓦石周擁其旁師居之晏如也昌邑君之季女適眞定少尹郭長倩會郭夫婦偕往眞定車騎甚都道出石橋問知師在橋下駐車拜禮以衣物存慰者甚厚師藐然若不相識一無所受夫人感泣長倩嗟異移時而去師於世緣堅决乃爾故能專意於道歲月浸久精神感格一日至灤城南神人授師大易忽大開悟事多前知名滿天下大安中朝廷賜以命書廣甯全道太古眞人卽其號也自灤城授易之後言人禍福毫髮無差且自知其壽數當七十有三至期辭誡門人無疾而逝所著書六帙實錄所載如此然則曩燕趙所聞猶未盡眞人之所有也序旣竟大師謂璧曰子作先師文集序而載正一興造得無贅乎余應之曰語錄記述以傳心也功德興建以示跡也余年七十有五囘首嚮來燕趙傳聞如隔再世非大師裒集遺文追錄行實則眞人之遺風餘烈無自發明況後學晩生甯易知此大師憑藉眞人道蔭興建正一功德照耀東方今舉之所以聳動學人俾易知耳古人有言曰雖無老成人尚有典刑在噫正一功德其亦眞人道蔭之典刑歟大師曰唯唯大師諱圓曦前宋名相文正公之裔也前翰林學士馮璧序癸巳之夏余自大梁北遷至銅臺聞天平有道士范公大師道價甚高且好賢喜事爲東州冠四方游士多往依之師皆振恤不厭遂欲一識之而未能也已而余還鄉里凡二年丙甲歲南游聞其名益甚因至東原得一拜下風其言議宏深胷懷灑落飄飄然非塵土中人余驚且服遂館於其宫踰兩旬相與之意甚厚將别出一編書曰此予師郝崑嵛太古歌詩今將重鋟木以傳子當爲我序余受而讀之則已有馮丈內翰題其首因紬繹再四歎曰是亦古之有道者歟何其言之精而理之妙也嘗謂士大夫生而爲學則曰吾欲兼善天下致君澤民然志不與時偕鮮克遂所願幽憂憤恚反自傷其身者多矣所謂兼善不能而獨善又失深可歎嗟彼方外之士初無濟時心則决然修鍊惟以壽命爲事精專篤慎其功日新雖不能白日飛昇亦保體完神康强終世與夫逐逐於外物爲虛名所劫持耗智刓精而無補吾教者相去亦遠矣若今郝公幼而立志挺挺不衰其塊處數年有玉潔松剛之操一旦談玄論易神解心融著書立言傳於身後而范公能發揚其師之道使大振於時而又刊定遺文以開悟晩學俱爲方外偉人故余有激而書以予吾儕之兩失者云是秋八月渾水劉祁序先師廣甯全道太古眞人郝君遇師於甯海傳衣於崑嵛神人授之以易大安錫之以號略見於內翰馮公之序不復容聲惟是平居製作若三教入易論一卷示教直言一卷解心經救苦經各一卷太古集一十五卷內周易參同契簡要釋義一卷師西來日眞定諸人已攻木行於代歸老之後又多所撰述至於舊集所傳時有改定世俗抄錄往往訛舛欲改新之蓋未暇也竊惟先師之道獨得於曠代不傳之妙粹之以易象廣之以禪悅精微宏廓遺世獨立法言遺論人所願見乃今魯魚莫辨眞僞交雜疑惑後學在於門人弟子寔任其責圓曦不敏䝉賴道蔭今得灑掃東原之正一居多暇日謹以師後來所正及世所未見者點校精審按爲定本刻而傳之敢以蕪辭冠之篇首夫至人達觀物無不可故辭旨所發務以明理爲宗非必駢四驪六抽青配白如世之業文者以聲律意度相夸耳在禪學則曰麤言及細語皆成第一義在孔門則曰辭達而已矣又曰以意逆志爲得之矣學者不志於道而惟華采是求豈爲道曰損損之又損之道乎向上諸師聞師一言一句卽以神仙許之至待爲方外眷屬生平教督嚴麾斥公足爲玄門之臨濟使今而尚存必能高提正令坐斷大千雖師子象王且知歛避狐狸野犴吾知其不能群矣倒景滅沒可勝浩歎雖然師之書故在也試取而讀之意必有目直而不能視口呿而不能言者矣歲次丙申長至日崑崙野服嗣教范圓曦謹序大道恍惚從無而入有乾坤造化自有以歸無夫有入於無故無出乎有元之一氣先天地生旣著三才浸成萬物萬物之動有生有尅有利有害有順有逆有好有惡有是有非方而類聚物以羣分尊卑有序泰道將興上下失節否時斯遘臨事之始而可潛當事之期而可躍履霜致堅冰之至龍戰則其血玄黃屯利居貞訟孚窒惕矯世以童蒙而處申令取毒蠱而明剛進待需柔而行有剝出門貴乎同人禍發基於大過艮止之兌說之賁華而離麗蹇滯而坎陷睽背也恒久也取新可以固鼎失律所以覆師光明則海內可觀晦跡則山林可遯非神化靈通其孰能與於此乎予嘗研精於周易刪正義以爲參同畫兩儀四象三才八卦六律九宫七政五行星辰張布日月度躔有無混成以爲圖象述懷應問詩詞歌賦共一十五卷分併三帙以慕太古之風目之曰太古集夫太古者太謂太易太初太始太素古謂遠古上古邃古亘古務使將來慕道君子知其不虛爲者也且夫氣象莫大乎天地變通莫大乎陰陽天地之英華陰陽之根本二氣之謂也木龍金虎赤鳳烏龜四象之謂也六七八九其數之謂也刀圭鉛汞生成備物之謂也神遇氣交性命之謂也紫府丹宫靈臺翠宇瓊樓絳闕玉洞珠簾玄關陽道地戸天門玉液金精黃芽白雪眞水眞火姹女嬰兒石人木馬九蟲三尸金翁黃婆芝草丹砂皆五行造化之謂也大抵動靜兩忘性圓命固契乎自然自然之道甚易知甚易行而天下莫能知莫能行者蓋情慾緣想害之之謂也人若去妄任眞超塵離法混俗而不凡獨立而不改抱一而不離周行而不怠於仙道其庶乎顔子有坐忘之德孟軻有養素之功蓋亦專於一事也今舉其大綱開諸異號所謂同歸而殊途名多而理一示之可以益於後學能使道心堅固眞正無私若執志待終則位標仙籍永作眞人神通萬變羽化飛昇矣如是則非我門而不入非我道而不然然而然然於不然而然也大定十八年歲在戊戌仲冬望後六日自序
