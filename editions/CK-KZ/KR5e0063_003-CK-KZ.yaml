body:
  text: 乾坤生六子圖乾卦爲老陽坤卦爲老陰因合而生六子也乾得坤之一氣而生巽長女也乾得坤之二氣而生离中女也乾得坤之三氣而生兌少女也坤得乾之一氣而生震長男也坤得乾之二氣而生坎中男也坤得乾之三氣而生艮少男也故曰乾生三女巽離兌坤生三男震坎艮是也八卦數爻成歲圖乾卦三畫長每畫别九之數故知三九二十七其乾卦重之有六畫每畫别九則六九五十四此者乾爻之數也坤卦三畫短每畫別六之數故知三六一十八其坤卦重之有六畫別六則六六三十六此者坤爻之數也此明一陽稱九一陰稱六外有震坎艮巽離兌陽陰不等互相推求而各有自然之數也八卦總其數三百有六十半之得一百有八十也象一年之數也二十四氣加臨乾坤二象陰陽損益圖冬至之日一陽始生而成復卦大寒之日二陽始生而成臨卦雨水之日三陽始生而成泰卦春分之日四陽始生而成大壯卦穀雨之日五陽始生而成夬卦小滿之日純陽而成乾卦夏至之日一陰始生而成姤卦大暑之日二陰始生而成遁卦處暑之日三陰始生而成否卦秋分之日四陰始生而成觀卦霜降之日五陰始生而成剝卦小雪之日純陰坤卦用事所謂損之而益益之而損也六子加臨二十四氣陰陽損益圖乾坤二象象天地之大用由未盡其理者再明日月之運行風雷之出没山澤之通塞據此六卦三男三女所行之道亦自冬至之日爲首以陽變陰以陰變陽至夏至之日爲首以陰變陽以陽變陰陽陰錯雜各有所變變而通之以明化物之功本自無爲之治出於自然而然也八卦反復圖乾一世乃有所變而得姤二變而得遁三變而得否四變而得觀五變而得剝此者自下升上上至五爻變之至極故自剝卦之後自上變下者名之遊魂而得晉卦晉卦之後下體三爻齊變而爲大有名之歸魂卦他皆倣此乾一變乾二變乾三變乾四變乾五變乾六變乾七變乾八變他皆倣此六十甲子加臨卦象圖夫天地之道而生萬物貴無過於人也則成三才之道而配支干納音爲六十甲子故有乾坤二卦而生六十有四數則有萬一千五百二十象萬物之數也衆象之內以屯爲初法此甲子有六十而自相配偶六十四卦而通萬物之情性以存品類之吉凶悔吝憂虞存亡得失無不備矣二十四氣加臨卦象圖起自冬至之日以中孚有信陽氣始生至夏至之日以咸相感一陰始長故知卦有六十經遊二十四氣之間凡三百六十而成一歲之功一年之內則有三百五十四日積之閏餘故知自冬之日至滿一歲度有三百六十五日四分度之一每一日管行一爻六日七分而成一卦內有閏餘共成其數也惟坎震離兌而歸四正不在其間者也五行悉備圖五行悉備三才衆象之宜八卦四維之屬以明變化之功有類一方之所自有生尅而爲順逆之時且如目主肝以情怒者必可以引金金主肺以情哭而誡勸因此自相感而爲相尅之勝負若不以金則用火火主心以情笑而接之其怒情漸去者爲相生之故也他皆倣此以明五行順逆生尅之道也天地生數圖天陽而地陰相交而有所生生而各有其所天一與地四而爲生也天三與地二而爲長也凡生長之數而天地之情可見矣故曰天地交而萬物通天地不交而萬物不通之故也今則陽數一三五陰數有四與二此陽之與陰共成一十有五陰陽各半而成天地之道故曰生長而名之生數者也天地成數圖地者陰也乘天之陽氣而可以成就萬物終始之道始則潛伏終則飛躍皆物之自然也地有陰數六八十天有陽數七與九故地六與天九而成地八與天七而就凡成之數則見天地之情其於天五與地十自相交通共成其數者凡天地之數五十有五而生長成就萬物終始之道也五運圖五運所行經輪十干而成五氣且如甲己之年土運時行乃爲黔天之氣也他皆倣此故知五行之象象曰五星木德歲星行逆之時木運行也熒惑行逆時火運也太白行逆時金運也辰星行逆時水運也鎮星行逆時土運也法此五星分布十干而成五運星則有伏順遲留逆之數六氣圖六氣者明三陽三陰之氣而行十二支神神之相對謂寅申之年少陽主之卯酉之年陽明主之辰戌之年太陽主之己亥之年厥陰主之子午之年少陰主之丑未之年太陰主之每年之內有六氣焉且如少陽司天厥陰在泉他皆倣此一氣有六十日也四象圖夫四象者重明天地日月之道六七八九之數如乾之老陽稱九坤之老陰稱六乾之少陽稱七坤之少陰稱八故知乾有六爻爻各稱九以四因之爻别三十六策坤有六爻爻各稱六以四因之爻别二十四乾陽爻一百九十二坤陰爻一百九十二總之得萬有一千五百二十之策當萬物之數也北斗加臨月將圖天垂萬象以北辰爲之樞機統領衆星無失其時者也夫北斗七星之列各自有方主之則曰魁枕參首杓擕龍角斗卧巨蟹者明知此北斗第一星謂之魁星第七星謂之杓星自魁至杓凡有七星而布南方七宫之辰也故曰戌爲河魁辰爲天罡凡經七辰象北斗焉二十四氣日行躔度加臨九道圖冬至之日日行牽牛夏至之日日行東井牽牛之宿南極之星也東井之宿北極之辰也自北極至於南極一屈一伸共行二十四氣經於二十八宿布三百六十五度四分度之一循環九道以明消息之功達其昇降之理者皆日行之道備矣日一年行一運月一月行一周故知日行則有盈虧月行則有疾有遲日行一日一度月行一日十三度者謂少一十二度象一十二月以成一歲焉日經十有二年而行天之十有二運月行之道卽不然也謂一年之中無閏而行天之一十二周有閏而行天之一十三周故知月之細度一日行一十有二度三十七分也日月之行閏餘生焉三才象三壇之圖夫三才者天一地二人三也今則不然所謂天在上地在下人立乎中以象三才非取一二三惟取上中下品是也故知上品類天之萬象以明十干之類是也中品類人有萬事此者皆自天之下自地之上而居於中以明八卦五行之屬是也下品類地之萬物以明十二支位是也此具三品以證三才易曰有天道焉有人道焉有地道焉天道廣矣地道大矣人道備矣天道雖廣若不以人法之而天道不能顯著地道雖大若不以人則
