front:
  text: 太古集卷之四
  hash: sha256:cccc124197174ecb20d37341ff8b065d2cd3b523b7284c5ed73cd7b5390c15d7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0063_HFL_004-001a, image: hfl/0798/0798-210.png}
body:
  text: 廣寧子郝大通撰金丹詩虚無之神統御萬靈先天地祖運日月精列光垂象造物變形推遷歲紀應用生成旁通恍惚鼓盪杳冥乾坤布化導引群情幽玄奥妙賢劫聖因其一宇宙之中幾丈夫惟神惟聖法規模無爲善入群生性獨立能開造化爐不逐東風吹柳絮休教秋月照冰壺金丹運至泥丸穴名姓元來記玉都其二五五純陽足有功大圓乾象以爲宗降形直入滄溟窟混體攸躋窈漠中有遇坎男騎白鹿無爲離女跨青龍當期一遘三千日鶴化烏龜石化松其三紅鼠黑蛇越世奇神仙此際泄天機雷聲一震三山裂日岀同光四海知是説老人呈皓首又聞赤子掛青衣先生謂彼敷真理報道郞君來得遲其四黄羊化作白猿猴猛虎留蹤待赤牛兔在穴中狸在火玄通妙處道根由誕靈降跡推遷運十二春還六十秋道氣歸身逢至友蓬萊會上約瀛洲其五一七元中九六年始知我命不由天炎風鼎内消紅雪偃月爐中煉瑞蓮斜枕曲江方睡覺海經三度變桑田南柯昔日黄糧夢説與崑崙太古仙其六恒星不現即如來静止安恬别立階四變艮宫成妙體返形革命達真胎學人悟此通心印覺者知之理性才解得箇中弧矢意千經萬論齊開其七三月雷轟一二聲始知天下鬼神驚風乘雲勢三千里虎假龍威九萬程萬化門中爲主宰八紘境裏作經營震之内象爻俱動上德皇君具姓名其八鼎器從來六有三一欹一側一安鐶金鉉玉質通嘉致供聖養賢煉瑞丹風火家人能返照變形易體改容顔須知烹飪成新法傳得鍾離道不難其九兌家有卦號歸魂返老延齡别有門少女聘時須待命長男交日見重孫口中安口如何説身外有身豈可論休道神仙無覓處蛻形忘跡道常存其十三千甲子一仙人天地之根造化神把握陰陽都一指斡旋萬象統微塵多應父少兒還老料想邪魔却是真解得神機顛倒理壺中長是笑欣欣其十一蒼龍鬥虎不曾閑少女驅回六長男會向黄庭頻俯仰寧知玉户默包含寶瓶頻綻紅蓮朵獅子潜行黑玉潭力士擒將歸洞府萬神羅列競來參其十二八卦相乘定主賓五行生尅驗君臣青鸞撞入火龍窟赤鳳飛吞金虎身夫婦相交調律吕父男和順得中純皆因神氣能常守一息沖融一寸真其十三欲識丹砂分兩齊西南北位配三奇九陽宫裏開金户陰六堂前攪玉池銖别三百八十四斤分十六兩須知午前子後隨時用萬道霞光罩玉輝其十四鉛汞須分陽與陰半斤銀合半斤金火雲飛入牛郞鼻霜月穿開織女心神水貯藏金井滿道源澄照玉泉深昇沉顛倒明離坎未悟之人何處尋其十五日精東畔月華西正是丹天壯盛時二八佳人呈雅態九三君子騁容儀水晶簾掛珍珠砌碼碯幢懸翡翠帷試問本來歸甚處七星樓上不曾離其十六刀圭元屬甚人家赤鳳端眸看落霞岸上草逢添瑞色灘頭石遇結靈砂北溟幾度鋸犀角南浦屢曾摘象牙更有一般堪賞處天池裏面放金花其十七問云何是最相宜奪得神功造化時虎踞碧潭風䬍䬍龍蟠朱洞雨漦漦雲英散却雷霆息露滴成須星斗移直待東方横素練彩霞捧出一輪曦其十八淳風高曠世非同不達幽微止謂空得意詩情唯自樂知心道話幾人通都緣執性迷真性盡散淳風昧教風一粒金丹爐内有料無仙骨卒難窮其十九陽九宫中大覺僧擎拳端坐誦黄庭神光射透虚空藏瑞氣清凝聚寶瓶遊宴洞天呈手段遍資法界騁威靈從兹解得西來意混沌之前豈有形其二十學仙須是煉金丹鉛汞將來鼎内安用火周天依次叙添功歲月莫盤桓存神先使心頭静養氣休令舌下乾十二時中無懈怠自然性命保全完其二十一五氣同宫共一家相資運斡霧生涯何車不离長安道寶貨常留桂月華鉛汞混融成上瑞氣神靈慧結丹砂全真妙用符玄用爛飲流霞穎彩霞其二十二如何得得飲刀圭無血羊兒是可刲山澤氣通雲出谷地天交泰木生梯坎離匹配知顛倒龍虎回還顯悟迷解得於中消息理管教平地踏雲霓其二十三常聽壺中金石聲凡情除去道情生陽神全後渾無寐陰魄消時更覺清火裏生蓮猶是可水中搏塊决然成圓融二物常相會穩駕雲車赴玉京其二十四閑引金烏宴月宫偶然會合便圓融神光照徹靈空體妙道衝開造化籠心識始知蝸舍客慧眸方見主人翁從兹啓悟身爲患不執虚名是大通其二十五學道先須絶外華修真養素屬仙家忘情蓋爲烹金液息慮都緣煉紫砂一性朝元攢五氣萬神聚頂放三花從兹得達長生路永向清霄混彩霞其二十六出家禀意望求仙必在真師口訣傳爐内飛鉛常固濟鼎中結汞永新鮮流金作屑銷龍骨滴露爲霜長玉涎心鏡一磨眀照徹本來面目自然圓其二十七修行休彊做消遥莫向空房守寂寥紫府不令群虎鬥丹宫能使萬神朝遊山每達青霄路渡水常登刳木橋採得靈芝頻服餌何須林下掛簞瓢其二十八三一壺中景異常長眉翁坐看松篁六銖絳彩裝金相十二重樓飲玉漿白鶴樹邊頻俯仰烏龜池畔任低昂靈童坎步前來立獻與先生續命湯其二十九元氣混成清浄體彩雲突出五方霞金丹結就純陽子玉液澆開不夜花無相門中堆白雪虚空藏裏産黄芽長生路上行人少秪是仙家與道家其三十天風吹綻洛陽花六合同塗意不差閑採牡丹烹嫩蘂静收芍藥煉英華調和二物清神氣溉濟三田餌麥麻携酒宴闌乘興逸坐騎白鹿入雲霞太古集卷之四
