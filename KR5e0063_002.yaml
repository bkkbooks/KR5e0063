front:
  text: 太古集卷之二友十一
  hash: sha256:b8491074b601a653d0b10363ffd8e33b12bdc57fa39e37a7cad312bf5650bb74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0063_HFL_002-001a, image: hfl/0798/0798-160.png}
body:
  text: 廣寧子郝大通撰乾象圖其數九稱老陽乾者爲天之用天者是乾之體天所以清虚高遠純陽不雜一氣冥運萬物化生乃可法天之用不可法天之體故曰乾象而稱老陽其數則九謂乾爲天有三畫三因之得九此卦重之六爻而各稱九是也夫天之道勢如偃蓋狀若雞卵取坤爲妻而生六子也坤象圖其數六稱老陰坤者爲地之用地者是坤之體地所以純厚廣載純陰不雜二氣昇降物有變遷乃可法地之用不可法地之體故曰坤象而稱老陰其數則六謂坤爲地有六畫象之稱六此卦重之六爻各稱六是也夫天有三畫而兼坤之六畫故稱九也惟地屬老陰而不得兼陽故稱六也日象圖日者太陽之精象離卦也其數則七而稱少陽者爲離卦上下俱長中虚則短成四畫面兼乾之三畫故稱七數而爲少陽者乾天之道覆蔭萬物清虚廣遠純陽不雜一氣冥運名曰老陽日之爲道雖無此大而光明著於八方普及天下出則爲晝没則爲夜故云少陽也月象圖月者太陰之精象坎卦其數則八而稱少陰者謂坎卦上下俱短中實則長成五畫而兼乾之三畫故稱其八而爲少陰者坤地之道大有所載名之老陰月之光明有圓有缺出則爲夜照耀無窮如地之大故稱少陰夫日月爲天地之子面得兼乾而不得兼坤所謂子從父也天地交泰圖天地交面泰不交而否者謂天之陽氣下降地中地之陰氣昇面天上此謂天地交而成泰若天之氣上騰地之氣下降者謂天地二氣不相交感而萬物則有所否閉不能通暢故天地宜交不宜不交萬物宜泰不宜不泰不泰則否故天道十有一年而泰十有二年而否也一紀之年全其否泰日月會合圖日月會而合不相會合而成弦望日則一年而行天之一周月則一月而行天之一周一歳之内無閏則十有二月月各會有所合故曰日月隔壁謂之朔朔者旦也旦者每月一日各有會合於日之下名之曰朔日月相衡謂之望四分之一謂之弦此者不相會合之時也光盡體伏謂之晦相近於合也天數奇象圖天爲純陽而有陽數陽數有一有三有五有七有九總面論之其得二十有五成乾之陽數而爲奇者謂奇爲四正方面兼乎中此之是也天數有五自相乘之則得奇數故曰北一東三南七西九中五皆陽數也陽之數一三五七九是也地數偶象圖地爲純陰而有陰數陰數有二有四有六有八有十總而論之共得三十成坤之陰數而爲偶者偶者爲四正方而兼乎中此之是也故曰東八西四北六南二中央十皆陰數也陰之數二四六八十是也地本方故稱偶天本圓故稱奇二十八宿加臨四象圖天象有二十八宿度則三百六十五又四分度之一者分布於十二分野之中而經星之常道也所以日月五行七政爲緯循環周度變化生焉以分四維四正之義者東方南方西方北方自得其數同天地日月之功有蒼龍焉有白虎焉有朱雀焉有玄武焉此者亦象春之與夏秋之與冬也二十四氣加臨七十二候圖天地定位日月運行八節四時自然運轉所以暑往則寒至春去則秋來而成一歲之功歳功之内有七十二候焉候謂應時之候明物有自然應節氣則五日七分而爲一候者也自立春至大寒之後凡爲一年則有之十二次物候自來應時之氣也河圖天地奇偶之數而成河圖則有五十五數惟此圖書則四十五數而遍九宫象龜之形狀頭九尾一左三右七二四爲肩六八爲足此自然之象也背上有五行而可以知往來占兆吉凶故通神明之德以類萬物之情天生神物聖人則之以爲圖書一三五七九爲奇屬陽也四正方二四六八爲偶屬陰也惟地數十在於龍腹不有所顯故存之不畫也變化圖夫易之道非神功而不可測非聖智而不可知故有太易乃未見之氣也有太初氣之始也有太始形之始也有太素質之始也氣形質具未相離者謂之混沌混沌既判兩儀有序萬物化成混沌已前則爲無也混沌之後則屬有也一有一無而爲混沌混混沌沌天地日月會合交泰之時也五行圖五行者水火土金木是也凡天地之數而各有合生於五行者所謂天一與地六合而生水地二與天七合而生火天三與地八合而生木地四與天九合而生金天五與地十合而生土天地之數五十有五而生成五行五行之數可見矣七言得之水九言得之火十一數而得之木十三數而得之金十五數而得之土此爲天地之數而生五行也天元十干圖天元十干者謂甲乙象木丙丁象火庚辛象金壬癸象水戊己象土夫木之爲體象春而生乎萬有主魂而靈見於苗火之爲體象夏而長乎萬物主性而神見於花金之爲體象秋而成乎品類主魄而氣見於實水之爲體象冬而就乎萬有主命而精見於根土旺象加四季之正逐時而有也三才入爐造化圖虚無爐中有白雪夫三才之道者天地人也天元有十干之屬地元有十二支之屬人元有五行八卦之屬此三才而配於支干五行卦象之屬而入乎虚而出乎無虚無之間而生長成就萬物之功不有怠倦者因造作而必得所化化之與造爲者本無爲之化也爐有三層十二門火居於中煉乎三才之真氣而合成道也八卦收鼎煉丹圖清浄鼎中有黄芽八卦收歸於鼎者謂乾象天坤象地震象龍發乎雷巽象虎生乎風坎象雲降乎雨离象電閃乎光艮象山通乎氣兌象澤説乎物因乾健而運自坤順而動得此三男三女妙乎大用而利於萬物此則明雷風雲雨電閃之屬本自晴空而來復歸晴空而去故謂之鼎鼎之爲器下存於火中煉其天地雷風火山水澤而成大丹也十二律吕之圖夫黄鍾之律以應十一月用事則九寸三分損一而生林鍾以應六月用事則三分而益一生太簇以應正月用事則三分損一而生南吕以應八月用事則三分益一而生姑洗以應三月用事則三分損一而生應鍾以應十月用事則三分益一而生無射以應九月用事則三分損一而生夾鍾以應二月用事則三分益一而生夷則以應七月用事則三分損一而生大吕以應十二月用事則三分益一而生蕤賓以應五月用事則三分損一而生清宫黄鍾九十分損五十七分而生仲吕以應四月用事則生執始執始生去滅去滅生南事凡自黄鍾之節至應鍾而爲十二管其有清宫執始去滅南事以爲律管之終故附之于下太古集卷之二
